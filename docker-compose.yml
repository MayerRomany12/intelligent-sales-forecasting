version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: olist_backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - MODEL_PATH=Models/best_xgboost_model.json
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8501,http://127.0.0.1:3000,http://127.0.0.1:8501
    volumes:
      - ./data:/app/data
      - ./Models:/app/Models
      - ./models:/app/models
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: src/dashboard/Dockerfile
    container_name: olist_dashboard
    ports:
      - "8501:8501"
    environment:
      - PORT=8501
      - HOST=0.0.0.0
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: olist_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
