name: Olist Sales DevOps CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-lint-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run python tests
      run: |
        # Run pytest if any test files exist
        if [ -d tests ] || find . -name "test_*.py" | grep -q .; then
          pytest
        else
          echo "No tests found to run."
        fi

  node-lint-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Build React Client
      run: |
        cd frontend
        VITE_API_URL=http://localhost:8000 npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build FastAPI Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: src/api/Dockerfile
        push: false
        tags: olist-sales-api:latest

    - name: Build Streamlit Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: src/dashboard/Dockerfile
        push: false
        tags: olist-sales-dashboard:latest

    - name: Build React Frontend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        build-args: |
          VITE_API_URL=http://localhost:8000
        push: false
        tags: olist-sales-frontend:latest
